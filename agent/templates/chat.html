<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Admin Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --mustard:       #E8A020;
            --mustard-dark:  #C47F08;
            --cream:         #FDF9F3;
            --cream-dark:    #F5EFE4;
            --white:         #FFFFFF;
            --gray-100:      #F4F4F4;
            --gray-200:      #E8E8E8;
            --gray-300:      #D0D0D0;
            --gray-500:      #888888;
            --charcoal:      #111111;
            --charcoal-mid:  #333333;
            
            --font-head: 'Outfit', 'Inter', -apple-system, sans-serif;
            --font-body: 'Inter', -apple-system, sans-serif;
            --radius:    14px;
            --radius-lg: 22px;
            --radius-xl: 40px;
            --shadow:    0 4px 20px rgba(0,0,0,.06);
            --transition: 0.2s ease;
        }

        body {
            font-family: var(--font-body);
            background: var(--cream);
            color: var(--charcoal);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .chat-wrapper {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            background: var(--white);
            border-radius: var(--radius-lg);
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        /* Header */
        .chat-header {
            border-bottom: 1px solid var(--gray-200);
            padding: 20px 24px;
            background: var(--white);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h1 {
            font-family: var(--font-head);
            font-size: 1.25rem;
            font-weight: 800;
            margin: 0;
            color: var(--charcoal);
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header h1 i {
            color: var(--mustard);
        }

        .chat-header p {
            font-size: 0.8rem;
            color: var(--gray-500);
            margin: 4px 0 0 0;
        }

        /* Messages */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--white);
        }

        .bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 0.9rem;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .bubble.user {
            background: var(--charcoal);
            color: var(--white);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bubble.ai {
            background: var(--gray-100);
            color: var(--charcoal);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .bubble.thinking {
            color: var(--gray-500);
            font-style: italic;
            background: none;
            padding: 0 10px;
            font-size: 0.85rem;
        }

        /* Input Area */
        .input-area {
            border-top: 1px solid var(--gray-200);
            padding: 16px 24px 24px;
            background: var(--white);
        }

        #messageInput {
            border: 1px solid var(--gray-300);
            background: var(--white);
            border-radius: var(--radius-xl);
            padding: 12px 20px;
            font-size: 0.9rem;
            color: var(--charcoal);
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        #messageInput:focus {
            box-shadow: none;
            border-color: var(--charcoal);
        }

        #sendBtn {
            border-radius: var(--radius-xl);
            background: var(--mustard);
            border: none;
            color: var(--charcoal);
            font-weight: 600;
            transition: background var(--transition);
        }

        #sendBtn:hover {
            background: var(--mustard-dark);
            color: var(--white);
        }

        #sendBtn:disabled {
            background: var(--gray-200);
            color: var(--gray-500);
        }

        .attach-btn {
            border-radius: var(--radius-xl);
            border: 1px solid var(--gray-300);
            color: var(--charcoal-mid);
            background: var(--white);
            transition: background var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            cursor: pointer;
        }

        .attach-btn:hover {
            background: var(--gray-100);
            color: var(--charcoal);
        }

        #previewStrip {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }

        .preview-item {
            position: relative;
            width: 70px;
            height: 70px;
        }

        .preview-item img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid var(--gray-200);
        }

        .preview-item .remove-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--danger);
            color: var(--white);
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .preview-item .upload-status {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.5);
            color: var(--white);
            font-size: 10px;
            text-align: center;
            border-radius: 0 0 6px 6px;
            padding: 2px 0;
        }

        .bubble-images {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }

        .bubble-images img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
        }

        #historyLoader {
            text-align: center;
            color: var(--gray-500);
            font-size: 13px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="chat-wrapper">

        <!-- Header -->
        <div class="chat-header">
            <div>
                <h1><i class="bi bi-robot"></i> AI Admin Agent</h1>
                <p>Manage your e-commerce store</p>
            </div>
            <a href="{% url 'landing' %}" class="btn btn-outline-secondary btn-sm" style="border-radius: 20px; font-size: 0.8rem; font-weight: 500; padding: 6px 16px;">
                <i class="bi bi-arrow-left"></i> Back to Store
            </a>
        </div>

        <!-- Messages -->
        <div id="chat">
            <div id="historyLoader">
                <div class="spinner-border spinner-border-sm text-secondary me-2" role="status"></div>
                Loading chat history...
            </div>
        </div>

        <!-- Input -->
        <div class="input-area">
            <div id="previewStrip"></div>
            <div class="d-flex gap-2">
                <label for="imageInput" class="attach-btn">
                    <i class="bi bi-paperclip"></i>
                </label>
                <input id="imageInput" type="file" accept="image/*" multiple class="d-none" onchange="handleImageSelect()" />
                <input id="messageInput" type="text" class="form-control" placeholder="Type a message..."
                    onkeydown="if(event.key==='Enter') sendMessage()" />
                <button id="sendBtn" class="btn btn-primary px-4" onclick="sendMessage()">
                    <i class="bi bi-send-fill"></i>
                </button>
            </div>
        </div>
    </div>

    {% csrf_token %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let images = {};
        let idCounter = 0;

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }

        function appendMessage(role, text, imagePreviews = []) {
            const chat = document.getElementById("chat");
            const msg = document.createElement("div");
            msg.classList.add("bubble", ...role.split(" "));
            if (text) msg.textContent = text;

            if (imagePreviews.length > 0) {
                const imgRow = document.createElement("div");
                imgRow.classList.add("bubble-images");
                imagePreviews.forEach(src => {
                    const img = document.createElement("img");
                    img.src = src;
                    imgRow.appendChild(img);
                });
                msg.appendChild(imgRow);
            }

            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
            return msg;
        }

        window.addEventListener("load", async () => {
            try {
                const res = await fetch("/agent/history/");
                const data = await res.json();
                document.getElementById("historyLoader").remove();

                if (data.history.length === 0) {
                    const empty = document.createElement("div");
                    empty.id = "historyLoader";
                    empty.textContent = "No previous chats. Start a conversation!";
                    document.getElementById("chat").appendChild(empty);
                }

                data.history.forEach(msg => {
                    appendMessage(msg.role, msg.content, msg.image_urls || []);
                });
            } catch (err) {
                document.getElementById("historyLoader").remove();
            }
        });

        function handleImageSelect() {
            const imageInput = document.getElementById("imageInput");
            const files = Array.from(imageInput.files);
            imageInput.value = "";

            files.forEach(file => {
                const id = `img_${idCounter++}`;
                const reader = new FileReader();

                reader.onload = (e) => {
                    const src = e.target.result;
                    images[id] = { url: null, previewSrc: src };
                    addPreviewItem(id, src);
                    uploadImage(id, file);
                };

                reader.readAsDataURL(file);
            });
        }

        function addPreviewItem(id, src) {
            const strip = document.getElementById("previewStrip");
            const item = document.createElement("div");
            item.classList.add("preview-item");
            item.id = `preview_${id}`;
            item.innerHTML = `
                <img src="${src}" />
                <button class="remove-btn" onclick="removeImage('${id}')">
                    <i class="bi bi-x"></i>
                </button>
                <div class="upload-status" id="status_${id}">Uploading...</div>
            `;
            strip.appendChild(item);
        }

        async function uploadImage(id, file) {
            const formData = new FormData();
            formData.append("image", file);

            try {
                const response = await fetch("/agent/upload/", {
                    method: "POST",
                    body: formData,
                    headers: { "X-CSRFToken": getCookie("csrftoken") }
                });
                const data = await response.json();

                if (data.url) {
                    images[id].url = data.url;
                    const status = document.getElementById(`status_${id}`);
                    if (status) {
                        status.textContent = "✓";
                        status.style.background = "rgba(25,135,84,0.7)";
                    }
                }
            } catch (err) {
                const status = document.getElementById(`status_${id}`);
                if (status) {
                    status.textContent = "Failed";
                    status.style.background = "rgba(220,53,69,0.7)";
                }
            }
        }

        function removeImage(id) {
            delete images[id];
            const preview = document.getElementById(`preview_${id}`);
            if (preview) preview.remove();
        }

        async function sendMessage() {
            const input = document.getElementById("messageInput");
            const btn = document.getElementById("sendBtn");
            const message = input.value.trim();
            if (!message) return;

            const uploadedUrls = Object.values(images).filter(i => i.url).map(i => i.url);
            const previewSrcs = Object.values(images).map(i => i.previewSrc);

            appendMessage("user", message, previewSrcs);
            input.value = "";
            btn.disabled = true;

            images = {};
            document.getElementById("previewStrip").innerHTML = "";

            const thinking = appendMessage("ai thinking", "Thinking...");

            try {
                const response = await fetch("/agent/chat/send/", {
                    method: "POST",
                    body: JSON.stringify({ message, image_urls: uploadedUrls }),
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": getCookie("csrftoken")
                    }
                });

                const text = await response.text();
                const data = JSON.parse(text);
                thinking.remove();
                appendMessage("ai", data.response);
            } catch (err) {
                thinking.remove();
                appendMessage("ai", "Error: " + err.message);
            }

            btn.disabled = false;
        }
    </script>
</body>
</html>
